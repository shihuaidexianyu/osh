name: Build EXE

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: msbuild OmenSuperHub.sln /t:Restore /p:RestorePackagesConfig=true /v:minimal

      - name: Build Release x64
        run: dotnet build OmenSuperHub.sln -c Release -p:Platform=x64 --no-restore

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item "bin\x64\Release\OmenSuperHub.exe" "artifacts\OmenSuperHub.exe"
          if (Test-Path "bin\x64\Release\OmenSuperHub.exe.config") {
            Copy-Item "bin\x64\Release\OmenSuperHub.exe.config" "artifacts\OmenSuperHub.exe.config"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmenSuperHub-windows-x64-release
          path: artifacts/
          if-no-files-found: error
